data:
  processed_dir: "data/processed/"
  stats_path: "data/processed/keypoint_stats.npz"

model:
  input_dim: 183
  d_model: 128
  encoder_layers: 2
  encoder_heads: 2
  encoder_ff_dim: 512
  encoder_dropout: 0.2
  decoder_layers: 2
  decoder_heads: 2
  decoder_ff_dim: 512
  decoder_dropout: 0.2
  n_mels: 80
  postnet_channels: 256
  postnet_kernel: 5
  postnet_layers: 3
  use_emotion: false
  emotion_dim: 32

training:
  epochs: 200
  batch_size: 8
  learning_rate: 0.001
  warmup_steps: 200
  weight_decay: 0.00001
  grad_clip: 1.0
  log_interval: 5
  save_interval: 20
  checkpoint_dir: "checkpoints/"
  device: "cuda"

loss:
  l1_weight: 1.0
  mse_weight: 1.0
  stop_weight: 10.0
  postnet_weight: 1.0

vocoder:
  model_path: "checkpoints/hifigan_pretrained/"
  config_path: "checkpoints/hifigan_pretrained/config.json"