data:
  processed_dir: "data/processed/"
  stats_path: "data/processed/keypoint_stats.npz"

model:
  input_dim: 183
  d_model: 128
  encoder_layers: 2
  encoder_heads: 2
  encoder_ff_dim: 512
  encoder_dropout: 0.1
  decoder_layers: 2
  decoder_heads: 2
  decoder_ff_dim: 512
  decoder_dropout: 0.1
  n_mels: 80
  postnet_channels: 256
  postnet_kernel: 5
  postnet_layers: 3
  use_emotion: false
  emotion_dim: 32

training:
  epochs: 50
  batch_size: 2
  learning_rate: 5.0e-4
  warmup_steps: 100
  weight_decay: 1.0e-6
  grad_clip: 1.0
  log_interval: 5
  save_interval: 10
  checkpoint_dir: "checkpoints/"
  device: "cuda"

loss:
  l1_weight: 1.0
  mse_weight: 1.0
  stop_weight: 1.0
  postnet_weight: 1.0

vocoder:
  model_path: "checkpoints/hifigan_pretrained/"
  config_path: "checkpoints/hifigan_pretrained/config.json"