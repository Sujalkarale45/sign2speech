data:
  processed_dir: "data/processed/"
  stats_path: "data/processed/keypoint_stats.npz"

model:
  input_dim: 183
  d_model: 128
  n_heads: 4          # ✅ match training
  n_layers: 3         # ✅ match training
  dropout: 0.25

training:
  epochs: 120
  batch_size: 16      # ✅ match code
  learning_rate: 0.0002   # ✅ stable
  weight_decay: 0.00001
  grad_clip: 0.5
  device: "cuda"

loss:
  label_smoothing: 0.12